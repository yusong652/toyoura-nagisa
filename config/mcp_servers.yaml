# MCP Servers Configuration
# Configure external MCP servers that toyoura-nagisa can connect to.
#
# Each server entry supports:
#   - name: Unique identifier for the server
#   - command: Command to launch the server (e.g., "npx", "uvx", "python")
#   - args: List of arguments for the command
#   - env: Optional environment variables (use ${VAR_NAME} for .env references)
#   - enabled: Default session-level setting (tools available by default for new sessions)
#              All servers are connected at startup regardless of this flag.
#              Users can toggle per-session via /mcps command in CLI.
#   - description: Human-readable description
#
# Environment variables:
#   - API keys and secrets should be stored in .env file
#   - Reference them using ${VAR_NAME} syntax in args or env

servers:
  # Context7 - Documentation query service
  # Get API key at: https://context7.com/dashboard
  - name: context7
    command: npx
    args:
      - "-y"
      - "@upstash/context7-mcp"
      - "--api-key"
      - "${CONTEXT7_API_KEY}"
    enabled: false
    description: Up-to-date documentation and code examples for libraries

  # Blender MCP - Blender 3D control (requires Blender with addon)
  # See: https://github.com/ahujasid/blender-mcp
  # - name: blender-mcp
  #   command: uvx
  #   args:
  #     - "blender-mcp"
  #   enabled: false
  #   description: Control Blender 3D via MCP

  # PFC MCP - ITASCA PFC control via external MCP server
  - name: pfc-mcp
    command: uv
    args:
      - "run"
      - "python"
      - "-m"
      - "pfc_mcp.server"
    enabled: true
    description: Control ITASCA PFC simulations via MCP

