main_agent:
  name: pfc_expert
  display_name: PFC Expert
  description: ITASCA PFC simulation with script-based workflow
  tools:
    - write
    - read
    - edit
    - bash
    - bash_output
    - kill_shell
    - glob
    - grep
    - web_search
    - web_fetch
    - todo_write
    - pfc_browse_commands
    - pfc_browse_python_api
    - pfc_browse_reference
    - pfc_query_python_api
    - pfc_query_command
    - pfc_execute_task
    - pfc_check_task_status
    - pfc_list_tasks
    - pfc_interrupt_task
    - pfc_capture_plot
    - invoke_agent
    - trigger_skill
  max_iterations: 64
  streaming_enabled: true
  enable_memory: true
  color: "#9C27B0"
  icon: "⚛️"
  skills:
    - pfc-package-management
    - pfc-server-setup

subagents:
  pfc_explorer:
    name: pfc_explorer
    display_name: "Tama (PFC Explorer)"
    description: "Tama - PFC documentation query agent (read-only)"
    tools:
      - read
      - glob
      - grep
      - bash
      - bash_output
      - pfc_browse_commands
      - pfc_browse_python_api
      - pfc_query_python_api
      - pfc_query_command
      - pfc_browse_reference
      - pfc_list_tasks
      - pfc_check_task_status
      - web_search
      - todo_write
    max_iterations: 64
    streaming_enabled: false
    enable_memory: false
    color: "#9E9E9E"
    icon: "🤖"
    skills: []

  pfc_diagnostic:
    name: pfc_diagnostic
    display_name: "Hoshi (PFC Diagnostic)"
    description: "Hoshi - Multimodal visual analysis agent for PFC simulation diagnostics"
    tools:
      - pfc_capture_plot
      - read
      - pfc_check_task_status
      - pfc_list_tasks
      - glob
      - grep
      - bash
      - bash_output
      - todo_write
    max_iterations: 64
    streaming_enabled: false
    enable_memory: false
    color: "#9E9E9E"
    icon: "🤖"
    skills: []
