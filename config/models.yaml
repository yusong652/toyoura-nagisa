# LLM Providers and Models Configuration
#
# This file defines available LLM providers and their models.
# You can add/modify entries here without changing code.
#
# Structure:
#   default: (optional)
#     provider: Default provider identifier (required)
#     model: Default model identifier (required)
#     secondary_model: Default secondary model for SubAgents (optional)
#
#   providers:
#     - provider: identifier (must match llm.py config, required)
#       name: Display name for UI (required)
#       description: Provider description (optional)
#       models:
#         - id: Model identifier for API calls (required)
#           name: Display name (required)
#           description: Model description (optional)
#           context_window: Token limit in tokens (optional, integer without commas)

# System default configuration (used when user hasn't set custom config via frontend)
default:
  provider: google
  model: gemini-3-flash-preview
  secondary_model: gemini-3-flash-preview

providers:

  # OpenAI GPT
  - provider: openai
    name: OpenAI GPT
    description: OpenAI's GPT models with advanced reasoning capabilities
    models:
      - id: gpt-5.2-2025-12-11
        name: GPT-5.2
        description: Latest GPT-5.2 model with enhanced capabilities
        context_window: 400000

      - id: gpt-5.2-codex
        name: GPT-5.2 Codex
        description: Specialized coding model based on GPT-5.2
        context_window: 400000

      - id: gpt-5-mini-2025-08-07
        name: GPT-5 Mini
        description: Lightweight GPT-5 variant for fast responses
        context_window: 400000

      - id: gpt-4o-2024-08-06
        name: GPT-4o
        description: GPT-4 optimized for general tasks
        context_window: 128000

  # Google Gemini
  - provider: google
    name: Google Gemini
    description: Google's Gemini models with multimodal capabilities and long context
    models:
      - id: gemini-3-pro-preview
        name: Gemini 3.0 Pro
        description: Preview of next-generation Gemini Pro
        context_window: 1048576

      - id: gemini-3-flash-preview
        name: Gemini 3.0 Flash
        description: Fast preview variant of Gemini 3.0
        context_window: 1048576

      - id: gemini-2.5-pro
        name: Gemini 2.5 Pro
        description: Latest production Gemini Pro model
        context_window: 1048576

      - id: gemini-2.5-flash
        name: Gemini 2.5 Flash
        description: Fast and efficient Gemini model
        context_window: 1048576

  # Anthropic Claude
  - provider: anthropic
    name: Anthropic Claude
    description: Anthropic's Claude models with strong reasoning and tool use
    models:
      - id: claude-opus-4-5-20251101
        name: Claude Opus 4.5
        description: Most capable Claude model for complex tasks
        context_window: 200000

      - id: claude-sonnet-4-5-20250929
        name: Claude Sonnet 4.5
        description: Balanced performance and speed
        context_window: 200000

      - id: claude-haiku-4-5-20251001
        name: Claude Haiku 4.5
        description: Fast and lightweight Claude model
        context_window: 200000

  # Moonshot AI
  - provider: moonshot
    name: Moonshot Kimi
    description: Moonshot's Kimi models with extended thinking capabilities
    models:
      - id: kimi-k2-thinking-turbo
        name: Kimi K2 Thinking Turbo
        description: Fast thinking model with enhanced reasoning
        context_window: 262144

      - id: kimi-k2-thinking
        name: Kimi K2 Thinking
        description: Deep reasoning model with extended context
        context_window: 262144

      - id: kimi-k2-turbo-preview
        name: Kimi K2 Turbo Preview
        description: Preview of high-speed K2 variant
        context_window: 262144

      - id: kimi-k2-0905-preview
        name: Kimi K2 0905 Preview
        description: September 2024 preview release
        context_window: 262144

  # Zhipu AI
  - provider: zhipu
    name: Zhipu GLM
    description: Zhipu's GLM models with bilingual capabilities
    models:
      - id: glm-4.7
        name: GLM-4.7
        description: Latest GLM generation with improved performance
        context_window: 200000

      - id: glm-4.6v
        name: GLM-4.6v
        description: Vision-enabled GLM model
        context_window: 200000

      - id: glm-4.7-flash
        name: GLM-4.7 Flash
        description: Fast variant of GLM-4.7
        context_window: 200000

  # OpenRouter
  - provider: openrouter
    name: OpenRouter
    description: Access to multiple model providers through unified API
    models:
      - id: qwen/qwen3-235b-a22b-2507
        name: Qwen 3 235B
        description: Large-scale Qwen model via OpenRouter
        context_window: 200000

      - id: x-ai/grok-4.1-fast
        name: Grok 4.1 Fast
        description: xAI's Grok model via OpenRouter
        context_window: 1048576
