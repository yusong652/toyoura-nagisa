# LLM Providers and Models Configuration
#
# This file defines available LLM providers and their models.
# You can add/modify entries here without changing code.
#
# Structure:
#   default: (optional)
#     provider: Default provider identifier (required)
#     model: Default model identifier (required)
#     secondary_model: Default secondary model for SubAgents (optional)
#
#   providers:
#     - provider: identifier (must match llm.py config, required)
#       name: Display name for UI (required)
#       description: Provider description (optional)
#       models:
#         - id: Model identifier for API calls (required)
#           name: Display name (required)
#           description: Model description (optional)
#           context_window: Token limit in tokens (optional, integer without commas)
#           multimodal: Whether the model supports multimodal content like images (optional, default: false)
#           thinking:
#             mode: "none" | "always_on" | "configurable"
#               - none: Model does not support thinking
#               - always_on: Model always uses thinking (e.g., o1, kimi-k2-thinking)
#               - configurable: Thinking can be configured via API params
#             options: [default, low, high]  # Only for 'configurable' mode
#             default: default  # Default thinking level

# System default configuration (used when user hasn't set custom config via frontend)
default:
  provider: google
  model: gemini-3-flash-preview
  secondary_model: gemini-3-flash-preview

providers:

  # OpenAI GPT
  - provider: openai
    name: OpenAI GPT
    description: OpenAI's GPT models
    models:
      - id: gpt-5.2-2025-12-11
        name: GPT-5.2
        description: GPT-5.2 model 
        context_window: 400000
        multimodal: true
        thinking:
          mode: configurable
          options: [default, low, high]
          default: high

      - id: gpt-5.2-codex
        name: GPT-5.2 Codex
        description: Specialized coding model based on GPT-5.2
        context_window: 400000
        multimodal: true
        thinking:
          mode: configurable
          options: [default, low, high]
          default: high

      - id: gpt-5-mini-2025-08-07
        name: GPT-5 Mini
        description: Lightweight GPT-5 variant for fast responses
        context_window: 400000
        multimodal: true
        thinking:
          mode: configurable
          options: [default, low, high]
          default: default

      - id: gpt-4o-2024-08-06
        name: GPT-4o
        description: GPT-4o
        context_window: 128000
        multimodal: true
        thinking:
          mode: none

  # Google Gemini
  - provider: google
    name: Google Gemini
    description: Google's Gemini models
    models:
      - id: gemini-3-pro-preview
        name: Gemini 3.0 Pro
        description: Gemini 3.0 Pro 
        context_window: 1048576
        multimodal: true
        thinking:
          mode: configurable
          options: [default, low, high]
          default: high

      - id: gemini-3-flash-preview
