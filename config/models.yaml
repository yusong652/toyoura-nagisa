          default: high

  # Moonshot AI
  - provider: moonshot
    name: Moonshot Kimi
    description: Moonshot's Kimi models
    models:
      - id: kimi-k2.5
        name: Kimi K2.5
        description: Multimodal model with vision capabilities
        context_window: 262144
