[pytest]
# Pytest configuration for toyoura-nagisa

# Test discovery
testpaths = packages/backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Coverage options
    --cov=packages/backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    # Coverage targets (fail if below threshold)
    --cov-fail-under=10
    # Disable warnings summary (too noisy)
    --disable-warnings
    # Show test durations
    --durations=10

# Async test support
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = packages/backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */config_example/*
    */venv/*
    */.venv/*

[coverage:report]
# Fail if coverage is below this threshold
fail_under = 10
precision = 2
show_missing = True
skip_covered = False

# Regexes for lines to exclude from coverage
exclude_lines =
    # Have to re-enable the standard pragma
    pragma: no cover
    # Don't complain about missing debug-only code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    # Don't complain about type checking imports
    if typing.TYPE_CHECKING:

[coverage:html]
directory = htmlcov
