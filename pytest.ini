[pytest]
# Pytest configuration for toyoura-nagisa

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = packages/backend/tests

# Minimum coverage percentage
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options
    --cov=packages/backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    # Fail if coverage is below 80% (commented out for initial testing)
    # --cov-fail-under=80
    # Warnings
    --disable-warnings
    # Parallel execution (uncomment after installing pytest-xdist: uv add --dev pytest-xdist)
    # -n auto

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use database, external services)
    e2e: End-to-end tests (full workflow)
    slow: Slow-running tests
    llm: Tests that involve LLM API calls (may need mocking)
    pfc: Tests for PFC integration
    websocket: WebSocket-related tests

# Coverage configuration
[coverage:run]
source = packages/backend
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */config_example/*
    */migrations/*

[coverage:report]
# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

# Report settings
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
