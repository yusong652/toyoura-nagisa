<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aiNagisa</title>
    <script src="live2d.min.js"></script>
    <script src="live2dcubismcore.min.js"></script>
</head>
<body>
    <h1>aiNagisa</h1>
    <div class="chat-container">
        <div id="chatbox"></div>
        <div class="input-container" style="display: flex; align-items: flex-end; gap: 8px;">
            <button id="addFileBtn" title="上传文件">＋</button>
            <input type="file" id="fileInput" style="display: none;" multiple>
            <div class="input-wrapper" style="flex: 1; display: flex; flex-direction: column;">
                <div id="filePreviewArea"></div>
                <textarea id="userInput" rows="1" placeholder="Type your message..." style="width: 100%;"></textarea>
            </div>
            <button id="sendButton">Send</button>
        </div>
    </div>
    <canvas id="live2d-canvas"></canvas>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
